name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup sqflite web worker assets
        run: dart run sqflite_common_ffi_web:setup --force

      - name: Build web
        run: flutter build web --release --base-href /PureFinance/ --no-tree-shake-icons --dart-define=FLUTTER_WEB_CANVASKIT_URL=./canvaskit/

      - name: Patch wasm loading for GitHub Pages MIME type issue
        run: |
          cd build/web
          # GitHub Pages serves .wasm as application/octet-stream instead of
          # application/wasm. The sqflite worker uses WebAssembly.instantiateStreaming
          # which requires correct MIME. Patch sqflite_sw.js to use a fallback fetch.
          if [ -f sqflite_sw.js ]; then
            sed -i 's/WebAssembly.instantiateStreaming(fetch(\([^)]*\))/fetch(\1).then(r=>r.arrayBuffer()).then(b=>WebAssembly.instantiate(b)/g' sqflite_sw.js || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
